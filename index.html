    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; line-height: 1.6; }

<body>
  <h1>苏苏自用源</h1>
  <p>发行版软件源（扁平 <code>debs/</code>）：</p>
  <pre>URL: https://susudear.github.io/roothide-procursus-backup/
Suites: ./
Components: (空)</pre>
  <p>或：</p>
  <pre>URL: https://susudear.github.io/roothide-procursus-backup/
Suites: stable
Components: main</pre>
  <p>自动任务会把 <code>llvm</code> 目录下的 deb 平铺同步到 <code>debs/</code>，并生成 <code>Packages</code> / <code>Packages.gz</code>。</p>
</body>
