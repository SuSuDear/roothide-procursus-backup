name: Update APT Repo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 全量 1900 可能很久
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dpkg-dev gzip bzip2 curl ca-certificates python3 git-lfs
          git lfs install

      - name: Sync all 1900 debs (flat into debs/)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SRC_OWNER: SuSuDear
          SRC_REPO: roothide.github.io
          SRC_BRANCH: main
          SRC_PATH: procursus/pool/main/iphoneos-arm64e/1900
          DEBS_DIR: debs
        run: |
          chmod +x scripts/sync_pool_debs.sh
          ./scripts/sync_pool_debs.sh

      - name: Generate Packages
        run: |
          chmod +x scripts/generate_packages.sh
          ./scripts/generate_packages.sh

      - name: Commit and push
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/commit_and_push.sh
          ./scripts/commit_and_push.sh
