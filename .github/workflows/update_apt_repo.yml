name: Update APT Repo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 不要用 LFS smudge：我们改回普通文件托管
          lfs: false

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dpkg-dev gzip bzip2 curl ca-certificates python3
          # gh is preinstalled on github runners

      - name: Sync all 1900 debs (real files, flat)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SRC_OWNER: SuSuDear
          SRC_REPO: roothide.github.io
          SRC_BRANCH: main
          SRC_PATH: procursus/pool/main/iphoneos-arm64e/1900
          DEBS_DIR: debs
        run: |
          chmod +x scripts/sync_pool_debs.sh
          ./scripts/sync_pool_debs.sh

      - name: Generate Packages
        env:
          REPO_OWNER: SuSuDear
          REPO_NAME: roothide-procursus-backup
          RELEASE_TAG: debs-large
        run: |
          chmod +x scripts/generate_packages.sh
          ./scripts/generate_packages.sh

      - name: Commit push and upload large debs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO_OWNER: SuSuDear
          REPO_NAME: roothide-procursus-backup
          RELEASE_TAG: debs-large
        run: |
          chmod +x scripts/commit_and_push.sh
          ./scripts/commit_and_push.sh
