name: Update APT Repo

on:
  workflow_dispatch:
    inputs:
      sync_llvm:
        description: Sync llvm debs into debs directory
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "0 16 * * *"
  push:
    paths:
      - "debs/**"
      - "scripts/**"
      - ".github/workflows/**"
      - ".gitattributes"

permissions:
  contents: write

concurrency:
  group: update-repo
  cancel-in-progress: true

jobs:
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs version

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dpkg-dev gzip bzip2 curl ca-certificates python3 git-lfs

      - name: Sync llvm debs
        if: github.event_name != 'push' && (github.event_name == 'schedule' || github.event.inputs.sync_llvm == 'true' || github.event.inputs.sync_llvm == true)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SRC_OWNER: SuSuDear
          SRC_REPO: roothide.github.io
          SRC_BRANCH: main
          SRC_PATH: procursus/pool/main/iphoneos-arm64e/1900/llvm
          DEBS_DIR: debs
        run: |
          chmod +x scripts/sync_llvm_debs.sh
          ./scripts/sync_llvm_debs.sh

      - name: Generate Packages
        run: |
          chmod +x scripts/generate_packages.sh
          ./scripts/generate_packages.sh

      - name: Show large files
        run: |
          echo "debs larger than 50MB:"
          find debs -type f -name '*.deb' -size +50M -printf '%s %p\n' 2>/dev/null | sort -nr || true
          du -sh debs || true

      - name: Commit and push
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install

          if [ ! -f .gitattributes ] || ! grep -q '*.deb' .gitattributes; then
            printf '%s\n' '*.deb filter=lfs diff=lfs merge=lfs -text' > .gitattributes
          fi
          git lfs track "*.deb"
          git add .gitattributes
          git add -A debs Packages Packages.gz Packages.bz2 Release scripts .github/workflows .gitattributes || true

          git lfs status || true
          git lfs ls-files | head -50 || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          python3 - <<'PY'
import subprocess, sys
out = subprocess.check_output(['git', 'diff', '--cached', '--name-only'], text=True)
files = [f for f in out.splitlines() if f]
bad = []
for f in files:
    if not f.endswith('.deb'):
        continue
    try:
        blob = subprocess.check_output(['git', 'show', f':{f}'], stderr=subprocess.DEVNULL)
    except Exception:
        continue
    if (not blob.startswith(b'version https://git-lfs.github.com/spec')
            and len(blob) > 100 * 1024 * 1024):
        bad.append((f, len(blob)))
if bad:
    print('ERROR: staged deb files exceed 100MB and are not LFS pointers:')
    for f, s in bad:
        print(f'  {f}: {s / 1024 / 1024:.1f} MB')
    sys.exit(1)
print('pre-commit size check OK')
PY

          git commit -m "chore: sync llvm debs and regenerate Packages $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin "HEAD:${BRANCH_NAME}"
